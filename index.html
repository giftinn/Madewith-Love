<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">

<style>
*{
    box-sizing:border-box
}

body{
margin:0;
font-family:'Inter',sans-serif;
background:#f7f2e9;
height:100vh;
overflow:hidden;
}

#app{
height:100%;
display:flex;
align-items:center;
justify-content:center;
}

.card{
position:absolute;
width:90%;
max-width:420px;
max-height:90vh;
overflow:auto;
background:#ffffff;
border-radius:26px;
padding:40px 32px;
text-align:center;
box-shadow:0 30px 70px rgba(17,24,68,.12);
opacity:0;
transform:scale(.94) translateY(40px);
transition:.7s cubic-bezier(.19,1,.22,1);
pointer-events:none;
border:1px solid rgba(17,24,68,.05);
}

.card::-webkit-scrollbar{
width:6px
}

.card::-webkit-scrollbar-thumb{
background:#7288AE;
border-radius:10px
}

.card.active{
opacity:1;
transform:scale(1) translateY(0);
pointer-events:auto;
}

h1,h2{
font-family:'DM Serif Display',serif;
margin:0 0 14px;
color:#111844;
}

p{
font-size:15px;
line-height:1.7;
opacity:.85;
color:#2f3765;
}

/* BUTTON */
button{
padding:12px 26px;
border:none;
border-radius:999px;
background:#111844;
color:#EAE0CF;
cursor:pointer;
margin-top:18px;
font-size:15px;
transition:.25s;
}

button:hover{
transform:scale(1.05);
background:#1d2763;
box-shadow:0 10px 25px rgba(17,24,68,.25);
}

/* PIN */
.pin-display{
display:flex;
justify-content:center;
gap:12px;
margin:25px 0;
}

.dot{
width:18px;
height:18px;
border-radius:50%;
border:2px solid #4B5694;
}

.dot.fill{
background:#4B5694
}

.keypad{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

.keypad button{
padding:16px;
font-size:18px;
border-radius:14px;
}

/* GAME */
#options{
display:flex;
flex-direction:column;
gap:12px;
margin-top:20px;
}

#options button{
background:#f7f2e9;
border:1px solid #4B5694;
color:#111844;
}

.score-box{
margin-top:22px;
font-size:15px;
letter-spacing:.5px;
color:#2f3765;
}

#feedback{
margin-top:14px;
min-height:22px;
font-size:14px;
transition:.3s;
}

/* CORRECT */
.correctAnim{
animation:pop .4s ease;
background:#dbe6ff !important;
border-color:#7288AE !important;
color:#111844 !important;
}

@keyframes pop{
0%{transform:scale(.9)}
60%{transform:scale(1.08)}
100%{transform:scale(1)}
}

.wrongAnim{
animation:shake .4s;
background:#ffd6d6 !important;
border-color:#ff9b9b !important;
}

@keyframes shake{
25%{transform:translateX(-6px)}
50%{transform:translateX(6px)}
75%{transform:translateX(-4px)}
}

/* TIMER */
.lovebox{
background:linear-gradient(145deg,#ffffff,#eef2ff);
border-radius:22px;
padding:20px;
margin-bottom:25px;
box-shadow:0 12px 35px rgba(75,86,148,.12);
border:1px solid rgba(75,86,148,.12);
}

.timer-title{
font-size:12px;
letter-spacing:2px;
opacity:.6;
color:#4B5694;
}

.timer-display{
font-family:'DM Serif Display',serif;
font-size:28px;
margin-top:8px;
color:#111844;
letter-spacing:1px;
animation:pulse 2.5s infinite;
}

@keyframes pulse{
50%{opacity:.5}
}

/* MEDIA */
.reveal-box{
margin:20px 0;
aspect-ratio:16/9;
display:flex;
align-items:center;
justify-content:center;
border-radius:20px;
border:2px dashed #7288AE;
cursor:pointer;
background:#f8faff;
transition:.3s;
}

.reveal-box:hover{
transform:scale(1.02)
}

/* LETTER FINAL */
.letter{
margin-top:22px;
font-family:'Cormorant Garamond',serif;
font-size:18px;
line-height:1.3;
letter-spacing:.4px;
text-align:left;
color:#111844;
opacity:.95;
min-height:100px;
animation:fadeInText 1.2s ease;
}

.signature{
margin-top:32px;
text-align:right;
font-family:'Playfair Display',serif;
font-size:20px;
letter-spacing:1px;
color:#4B5694;
animation:fadeInText 1.8s ease;
}

@keyframes fadeInText{
from{
opacity:0;
transform:translateY(10px)
}
to{
opacity:1;
transform:translateY(0)
}
}

/* HEART BACKGROUND */
canvas{
position:fixed;
inset:0;
z-index:-1;
pointer-events:none;
}
</style>
</head>

<body>

<canvas id="confettiCanvas"></canvas>

   <audio id="bgm" src="song.mp3" loop></audio>
   
<div id="app">

<!-- welcome -->
<section class="card active">
<h1>aloo daffa</h1>
<p>this is for you, <br> but you have to unlock it!</p>
<button onclick="next()">Unlock</button>
</section>

<!-- pin -->
<section class="card">
<h2>Enter the code 🔐</h2>
<div class="pin-display" id="pin"></div>

<div class="keypad">
<button onclick="press(1)">1</button>
<button onclick="press(2)">2</button>
<button onclick="press(3)">3</button>
<button onclick="press(4)">4</button>
<button onclick="press(5)">5</button>
<button onclick="press(6)">6</button>
<button onclick="press(7)">7</button>
<button onclick="press(8)">8</button>
<button onclick="press(9)">9</button>
<button onclick="clearPin()">⌫</button>
<button onclick="press(0)">0</button>
<button onclick="checkPin()">✔</button>
</div>
</section>

<!-- quiz -->
<section class="card">
<h2 id="question">Little game 🎮</h2>
<p>Answer correctly to earn points</p>
<div id="options"></div>

<div class="score-box">
Points: <span id="score">0</span> / 4
</div>

<p id="feedback"></p>
</section>

<!-- final -->
<section class="card">

<h1>A Letter for Our First Month</h1>

<div class="lovebox">
<div class="timer-title">TIME WITH YOU</div>
<div id="loveTimer" class="timer-display">loading...</div>
</div>

<div class="reveal-box" onclick="revealMemory(this)">
Tap to reveal our memory
</div>

<div id="letter" class="letter"></div>
<div id="sign" class="signature"></div>

</section>

</div>

<script>

/* =================================================
   SLIDE NAVIGATION
================================================= */

const cards=document.querySelectorAll('.card');
let page=0;
const music=document.getElementById("bgm");
music.volume=0.4;
let musicStarted=false;

function show(){
cards.forEach(c=>c.classList.remove('active'));
cards[page].classList.add('active');
if(page===3)startTimer();
}

function next(){
page++;

if(page===1 && !musicStarted){
music.play();
musicStarted=true;
}

show();
if(page===2)loadQuestion();
}


/* =================================================
   PIN SYSTEM
================================================= */

let pinInput = '';
const correctPin = '2504';
const pinDisplay = document.getElementById("pin");

function renderDots(){
    pinDisplay.innerHTML = '';

    for(let i=0;i<4;i++){
        const d = document.createElement("div");
        d.className = "dot" + (i < pinInput.length ? " fill" : "");
        pinDisplay.appendChild(d);
    }
}

renderDots();

function press(n){
    if(pinInput.length < 4){
        pinInput += n;
        renderDots();
    }
}

function clearPin(){
    pinInput = pinInput.slice(0,-1);
    renderDots();
}

function checkPin(){
    if(pinInput === correctPin){
        next();
    }else{
        pinDisplay.classList.add('shake');

        setTimeout(()=>{
            pinDisplay.classList.remove('shake');
        },400);

        pinInput = '';
        renderDots();
    }
}


/* =================================================
   QUIZ SYSTEM
================================================= */

const questions=[
{q:"When did we first meet?", options:["April","July","Juni"],correct:1},
{q:"What do i do when i miss you?", options:["sleep","text you","pretend i'm fine"],correct:1},
{q:"Who's love harder?", options:["Me","You","Both"],correct:2},
{q:"Will you stay with me for another month and more?", options:["Big no","Let me think first","Yeshh ofc"],correct:2}
];

let currentQ = 0;
let score = 0;

const scoreEl = document.getElementById("score");
const question = document.getElementById("question");
const options = document.getElementById("options");
const feedback = document.getElementById("feedback");


function loadQuestion(){

    const q = questions[currentQ];

    question.textContent = q.q;
    options.innerHTML = "";
    feedback.textContent = "";

    q.options.forEach((opt,i)=>{
        const b = document.createElement("button");
        b.textContent = opt;
        b.onclick = () => checkAnswer(i,b);
        options.appendChild(b);
    });
}


function checkAnswer(i,btn){

    const q = questions[currentQ];

    if(i === q.correct){

        score++;
        scoreEl.textContent = score;

        btn.classList.add("correctAnim");
        feedback.textContent = "Correct🤍";

        setTimeout(()=>{
            currentQ++;

            if(currentQ < questions.length){
                loadQuestion();
            }else{
                next();
            }
        },900);

    }else{

        btn.classList.add("wrongAnim");
        feedback.textContent = "Oh no, Try again!";
    }
}


/* =================================================
   RELATIONSHIP TIMER
================================================= */

function startTimer(){

    const start = new Date("2025-07-09T00:00:00");

    setInterval(()=>{

        const diff = new Date() - start;

        const d = Math.floor(diff / 86400000);
        const h = Math.floor(diff / 3600000) % 24;
        const m = Math.floor(diff / 60000) % 60;
        const s = Math.floor(diff / 1000) % 60;

        document.getElementById("loveTimer").textContent =
        `${d} days ${h}h ${m}m ${s}s`;

    },1000);
}


/* =================================================
   MEMORY REVEAL + TYPING LETTER
================================================= */

let alreadyRevealed = false;

function revealMemory(el){

    if(alreadyRevealed) return;
    alreadyRevealed = true;

    el.innerHTML = `
        <img src="pict.jpeg"
        style="width:100%;height:100%;object-fit:cover;border-radius:18px">
    `;

    const text = `happy 1st monthsary🤍
      can't believe it's been a month already.
      
      thank you for being here and making my days a little better. even though we're far apart, you've become a part of my day.
      
      thank you for every call, every message, and every moment we've shared this past month. i love the way you talk to me, the way you reply to all my random messages, and how you make everything feel warm even though we're far apart.
      
      thank you so much for being patient every time we're arguing, thank you for staying, sayangg.
      
      bebe, i always pray for our relationship to last. i'm really happy it's you.
      
      thank you for staying with me, even though i always make the same mistakes.
      
      i love you so much, bebe. 🤍
`;

    const paragraphs = text.trim().split(/\n\s*\n/);

    const letter = document.getElementById("letter");
    const sign = document.getElementById("sign");

    if(!letter || !sign) return console.error("Letter or Sign element missing");

    let p=0;
    let i=0;

    function typeParagraph(){

        if(p>=paragraphs.length){
            sign.innerHTML="Sincerely<br> Me";
            return;
        }

        const para=document.createElement("p");
        letter.appendChild(para);

        const typing=setInterval(()=>{
            para.innerHTML+=paragraphs[p].charAt(i);
            i++;

            if(i>=paragraphs[p].length){
                clearInterval(typing);
                p++;
                i=0;
                setTimeout(typeParagraph,350);
            }

        },30);
    }

    typeParagraph();
}


/* =================================================
   FLOATING HEARTS BACKGROUND
================================================= */

const canvas = document.getElementById("confettiCanvas");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let hearts = [];

for(let i=0;i<140;i++){
    hearts.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        s: Math.random()*6+2,
        v: Math.random()*0.6+0.2
    });
}

function heart(x,y,s){

    ctx.beginPath();

    ctx.moveTo(x,y);
    ctx.bezierCurveTo(x,y-s,x-s,y-s,x-s,y);
    ctx.bezierCurveTo(x-s,y+s,x,y+s*1.4,x,y+s*1.8);
    ctx.bezierCurveTo(x,y+s*1.4,x+s,y+s,x+s,y);
    ctx.bezierCurveTo(x+s,y-s,x,y-s,x,y);

    ctx.fill();
}


function anim(){

    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "rgba(17,24,68,0.35)";

    hearts.forEach(h=>{
        heart(h.x,h.y,h.s);

        h.y += h.v;

        if(h.y > canvas.height){
            h.y = -90;
            h.x = Math.random()*canvas.width;
        }
    });

    requestAnimationFrame(anim);
}

anim();

</script>

</body>
</html>
